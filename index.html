<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance Pro - Ramzan Ahsan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-btn { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: 0.3s; }
        .glow-btn:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); transform: translateY(-2px); }
        select, textarea { background: #161e2e !important; border: 1px solid #2d3748 !important; color: white !important; outline: none; }
    </style>
</head>
<body class="min-h-screen p-6 flex flex-col items-center">
    
    <div class="max-w-5xl w-full">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black">Seedance <span class="text-indigo-400">PRO</span></h1>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest">Developed by Ramzan Ahsan</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-6 rounded-3xl space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Model Selection</label>
                        <select id="model" onchange="syncSettings()" class="w-full mt-1 p-3 rounded-xl text-xs">
                            <option value="Seedance 1.5 Pro">Seedance 1.5 Pro</option>
                            <option value="Seedance 1.0 Pro">Seedance 1.0 Pro</option>
                            <option value="Seedance 1.0 Lite">Seedance 1.0 Lite</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Visual Prompt</label>
                        <textarea id="prompt" rows="3" class="w-full mt-1 p-3 rounded-xl text-sm" placeholder="A cinematic mountain sunset..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Ratio</label>
                            <select id="ratio" class="w-full mt-1 p-2 rounded-lg text-xs">
                                <option value="16:9">16:9</option>
                                <option value="9:16">9:16</option>
                                <option value="1:1">1:1</option>
                                <option value="4:3">4:3</option>
                                <option value="21:9">21:9</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Resolution</label>
                            <select id="resolution" class="w-full mt-1 p-2 rounded-lg text-xs">
                                <option value="720p">720p</option>
                                <option value="480p">480p</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Duration</label>
                        <select id="duration" class="w-full mt-1 p-2 rounded-lg text-xs"></select>
                    </div>

                    <button onclick="generate()" id="genBtn" class="w-full py-4 rounded-2xl font-bold glow-btn text-sm uppercase">Generate Video</button>
                    <p id="audio-note" class="text-[9px] text-indigo-300 text-center italic"></p>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass rounded-[2rem] min-h-[450px] flex flex-col items-center justify-center p-10 text-center">
                    <div id="idle-view">
                        <p class="text-slate-500 text-sm">System Ready for Render</p>
                    </div>

                    <div id="loading-view" class="hidden">
                        <div class="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-indigo-400 font-bold animate-pulse">AI is rendering your video...</p>
                    </div>

                    <div id="success-view" class="hidden w-full">
                        <div class="mb-8">
                            <span class="px-4 py-1 bg-green-500/10 text-green-400 text-[10px] font-bold rounded-full border border-green-500/20">SUCCESS</span>
                        </div>
                        <a id="video-link" href="#" target="_blank" class="inline-flex items-center gap-3 bg-white text-black font-black px-8 py-5 rounded-2xl hover:bg-slate-200 transition-all">
                            OPEN VIDEO IN NEW TAB
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-width="2"/></svg>
                        </a>
                        <p class="mt-10 text-[10px] text-slate-600 font-bold uppercase tracking-[0.3em]">Developer: Ramzan Ahsan</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function syncSettings() {
            const model = document.getElementById('model').value;
            const dur = document.getElementById('duration');
            const note = document.getElementById('audio-note');
            dur.innerHTML = '';

            if (model === "Seedance 1.5 Pro") {
                [4, 8, 12].forEach(s => dur.add(new Option(`${s} Seconds`, s)));
                note.textContent = "Audio: Supported on 4s & 8s. 12s is Video Only.";
            } else {
                [5, 10].forEach(s => dur.add(new Option(`${s} Seconds`, s)));
                note.textContent = "Audio: Not supported on this model.";
            }
        }

        async function generate() {
            const btn = document.getElementById('genBtn');
            const prompt = document.getElementById('prompt').value;
            if(!prompt) return alert("Please enter a prompt");

            btn.disabled = true;
            btn.innerText = "Processing...";
            document.getElementById('idle-view').classList.add('hidden');
            document.getElementById('success-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            const query = new URLSearchParams({
                prompt: prompt,
                model: document.getElementById('model').value,
                ratio: document.getElementById('ratio').value,
                resolution: document.getElementById('resolution').value,
                duration: document.getElementById('duration').value
            });

            try {
                const res = await fetch(`/api/generate?${query.toString()}`);
                const data = await res.json();
                
                // Matches your screenshot structure: data.result.data.video_url
                const url = data.result?.data?.video_url;

                if (url) {
                    document.getElementById('video-link').href = url;
                    document.getElementById('loading-view').classList.add('hidden');
                    document.getElementById('success-view').classList.remove('hidden');
                } else {
                    throw new Error("Provider server busy or error.");
                }
            } catch (err) {
                alert("Error: " + err.message);
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('idle-view').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Video";
            }
        }
        window.onload = syncSettings;
    </script>
</body>
</html>
